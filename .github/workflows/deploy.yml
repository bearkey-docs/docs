name: Deploy documentation site

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - devin/initial-readme
  pull_request:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate missing doc categories
        run: npm run ensure-categories

      - name: Commit generated doc categories
        if: github.event_name == 'push'
        run: |
          if [ -n "$(git status --porcelain -- 'docs/**/_category_.json')" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add 'docs/**/_category_.json'
            git commit -m "Generate missing doc category metadata"
            git push
          fi

      - name: Build site
        run: npm run build

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
