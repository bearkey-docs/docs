name: Deploy documentation site

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - devin/initial-readme
  pull_request:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install image tools
        run: sudo apt-get update && sudo apt-get install -y webp rsync sshpass

      - name: Install dependencies
        run: npm ci

      - name: Prepare docs
        run: npm run prepare-docs

      - name: Commit generated doc updates
        if: github.event_name == 'push'
        run: |
          if [ -n "$(git status --porcelain -- docs_cn docs_en src/generated)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add docs_cn docs_en src/generated
            git commit -m "Prepare generated doc assets"
            git push
          fi

      - name: Build site
        env:
          DOC_IMAGE_CDN_BASE: ${{ vars.DOC_IMAGE_CDN_BASE }}
          MANUAL_IMAGE_CDN_BASE: ${{ vars.MANUAL_IMAGE_CDN_BASE }}
          GISCUS_REPO: ${{ vars.GISCUS_REPO }}
          GISCUS_REPO_ID: ${{ vars.GISCUS_REPO_ID }}
          GISCUS_CATEGORY: ${{ vars.GISCUS_CATEGORY }}
          GISCUS_CATEGORY_ID: ${{ vars.GISCUS_CATEGORY_ID }}
        run: npm run build

      - name: Sync image assets to Bearkey host
        if: github.event_name == 'push'
        env:
          BEARKEY_DOCS_IMAGE_HOST: ${{ secrets.BEARKEY_DOCS_IMAGE_HOST }}
          BEARKEY_DOCS_IMAGE_USER: ${{ secrets.BEARKEY_DOCS_IMAGE_USER }}
          BEARKEY_DOCS_IMAGE_REMOTE_DIR: ${{ vars.BEARKEY_DOCS_IMAGE_REMOTE_DIR }}
          BEARKEY_DOCS_IMAGE_SSH_PRIVATE_KEY: ${{ secrets.BEARKEY_DOCS_IMAGE_SSH_PRIVATE_KEY }}
          BEARKEY_DOCS_IMAGE_SSH_PASSWORD: ${{ secrets.BEARKEY_DOCS_IMAGE_SSH_PASSWORD }}
        run: ./scripts/sync-doc-image-assets.sh

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
